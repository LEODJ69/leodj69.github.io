<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Emisoras de Radio</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#050816;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
}

.phone{
    width:380px;
    max-width:100vw;
    height:100vh;
    background:linear-gradient(180deg,#0c1124,#02050f);
    border-radius:30px;
    border:2px solid #00d4ff;
    box-shadow:
        0 0 20px #00d4ff,
        0 0 60px rgba(0,212,255,.25);
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.header{
    text-align:center;
    padding:15px;
    border-bottom:1px solid rgba(0,212,255,.3);
}

.header h1{
    color:#00d4ff;
    font-size:22px;
    letter-spacing:2px;
}

.display{
    padding:20px;
    text-align:center;
}

.radio-icon{
    width:130px;
    height:130px;
    margin:auto;
    border-radius:50%;
    border:3px solid #00d4ff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    box-shadow:0 0 25px #00d4ff;
}

.station{
    margin-top:15px;
    font-size:18px;
    color:#a6ff00;
    font-weight:bold;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.btn{
    background:#08142c;
    border:1px solid #00d4ff;
    color:#02ff17;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
}

.btn:hover,
.btn:focus{
    background:#00d4ff;
    color:#000;
}

.volume-box{
    padding:15px;
    
}

#volume{
    width:100%;
}

.list-title{
    text-align:center;
    padding:10px;
    color:#a6ff00;
    border-top:1px solid rgba(0,212,255,.2);
}

#playlist{
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.channel{
    background:#08142c;
    margin-bottom:8px;
    padding:12px;
    border-radius:12px;
    cursor:pointer;
    border:1px solid transparent;
}

.channel:hover,
.channel:focus{
    border-color:#00d4ff;
}

.channel.active{
    background:#00d4ff;
    color:#000;
    font-weight:bold;
}

::-webkit-scrollbar{
    width:6px;
}

::-webkit-scrollbar-thumb{
    background:#00d4ff;
    border-radius:10px;
}

@media(max-width:600px){
    .phone{
        width:100%;
        height:100vh;
        border-radius:0;
    }
}
</style>
</head>
<body>
<div class="phone">
<div class="header">
<h1>RADIO ONLINE</h1>
</div>
<div class="display">
<div class="station" id="stationName">
            Seleccione una emisora
        </div>
<div class="controls">
<button class="btn" id="playBtn">▶ Play</button>
<button class="btn" id="pauseBtn">⏸ Pausa</button>
</div>
</div>
<div class="volume-box">
        🔊 Volumen
        <input id="volume" max="1" min="0" step="0.01" type="range" value="1"/>
</div>
<div class="list-title">LISTA DE EMISORAS<br/>
<button class="btn" id="showFavBtn">★ Favoritos</button>
<button class="btn" id="showAllBtn">Todas</button>
<button class="btn" onclick="goHome()" tabindex="1">🏠 HOME</button></div>
<div style="padding:2px;">
<input id="searchBox" placeholder="Buscar emisora o categoría..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #00d4ff;background:#08142c;color:white;" type="text"/>
</div>
<div id="playlist"></div>
</div>
<audio id="audio" preload="none"></audio>
<script>

const M3U_URL =
'https://raw.githubusercontent.com/12081985EFRAIN/28122024/main/radiosbo.m3u';

const audio = document.getElementById('audio');
const playlist = document.getElementById('playlist');
const stationName = document.getElementById('stationName');

let currentUrl = '';
let reconnectTimer = null;
let reconnectAttempts = 0;
let stations = [];

async function loadM3U(){

    try{

        const response = await fetch(M3U_URL,{mode:'cors',cache:'no-store'});
        const text = await response.text();

        parseM3U(text);

    }catch(error){

        playlist.innerHTML =
        '<div class="channel">No se pudo cargar la lista. Verifique CORS/GitHub.</div>';

        console.error(error);
    }
}

function parseM3U(content){

    playlist.innerHTML = '';

    const lines = content.split('\n');

    let name = '';

    for(let i=0;i<lines.length;i++){

        const line = lines[i].trim();

        if(line.startsWith('#EXTINF')){

            const parts = line.split(',');
            name = parts[parts.length-1];

        }else if(
            line &&
            !line.startsWith('#')
        ){

            stations.push({name:name || 'Radio', url:line});
            createChannel(name || 'Radio', line);
        }
    }
}

const FKEY='radioFavs';
let showFav=false;
function favs(){return JSON.parse(localStorage.getItem(FKEY)||'[]')}
function saveFav(a){localStorage.setItem(FKEY,JSON.stringify(a))}
function createChannel(name,url){

    const div = document.createElement('div');

    div.className='channel';
    const star=document.createElement('span');star.textContent=favs().includes(url)?'★ ':'☆ ';star.style.cursor='pointer';star.onclick=(e)=>{e.stopPropagation();let f=favs(); if(f.includes(url))f=f.filter(x=>x!=url); else f.push(url); saveFav(f); renderList();}; div.appendChild(star); const t=document.createElement('span');t.textContent=name; div.appendChild(t);
    div.tabIndex=0;

    div.onclick=()=>playStation(name,url);

    playlist.appendChild(div);
}

function playStation(name,url){

    document.querySelectorAll('.channel')
    .forEach(el=>el.classList.remove('active'));

    [...document.querySelectorAll('.channel')]
    .find(el=>el.textContent===name)
    ?.classList.add('active');

    stationName.textContent=name;

    currentUrl=url;

    audio.src=url;
    audio.load();

    audio.play()
    .catch(console.error);
}

document.getElementById('playBtn')
.onclick=()=>audio.play();

document.getElementById('pauseBtn')
.onclick=()=>audio.pause();

document.getElementById('volume')
.oninput=e=>audio.volume=e.target.value;


document.getElementById('searchBox').addEventListener('input', e=>{
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.channel').forEach(ch=>{
        ch.style.display = ch.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
});

audio.addEventListener('playing', ()=>{
    reconnectAttempts = 0;
});

function reconnect(){

    clearTimeout(reconnectTimer);

    reconnectTimer=setTimeout(()=>{

        if(currentUrl){ audio.crossOrigin='anonymous';

            reconnectAttempts++;
            console.log('Reconectando intento', reconnectAttempts);

            const t = audio.currentTime || 0;

            audio.src='';
            audio.load();

            setTimeout(()=>{
                audio.src=currentUrl;
                audio.load();
                audio.currentTime=t;
                audio.play().catch(()=>{});
            },1000);

        }

    }, Math.min(3000 + reconnectAttempts*2000, 15000));
}


function renderList(){playlist.innerHTML='';stations.filter(s=>!showFav||favs().includes(s.url)).forEach(s=>createChannel(s.name,s.url));}
document.getElementById('showFavBtn').onclick=()=>{showFav=true;renderList()};document.getElementById('showAllBtn').onclick=()=>{showFav=false;renderList()};
parseM3U=(c=>{return function(content){stations=[]; const lines=content.split('\n'); let name=''; for(let l of lines){l=l.trim(); if(l.startsWith('#EXTINF')) name=l.split(',').pop(); else if(l && !l.startsWith('#')) stations.push({name:name||'Radio',url:l});} renderList();}})();
loadM3U();

function goHome(){
    window.location.href="home.html";
}
</script>
<script>
// Integración: sustituir carga fija por detección compatible de M3U/M3U8 y HLS.js.
const HLS_JS='https://cdn.jsdelivr.net/npm/hls.js@latest';
if(!document.querySelector('script[data-hls]')){
 const s=document.createElement('script');
 s.src=HLS_JS;s.dataset.hls=1;document.head.appendChild(s);
}
const OLD=loadM3U;
loadM3U=async function(){
 const url='https://raw.githubusercontent.com/12081985EFRAIN/28122024/main/radios.m3u8';
 const r=await fetch(url,{cache:'no-store'});
 parseM3U(await r.text());
}
const _play=playStation;
playStation=function(name,url){
 stationName.textContent=name;
 currentUrl=url;
 if(window.Hls && Hls.isSupported() && url.toLowerCase().includes('.m3u8')){
   if(window._hls)window._hls.destroy();
   window._hls=new Hls();
   window._hls.loadSource(url);
   window._hls.attachMedia(audio);
   window._hls.on(Hls.Events.MANIFEST_PARSED,()=>audio.play().catch(()=>{}));
 }else{
   audio.src=url;audio.load();audio.play().catch(()=>{});
 }
}
</script></body>
</html>
