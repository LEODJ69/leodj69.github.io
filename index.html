<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso TVDeporte</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#020b1f,#061a3a,#020b1f);display:flex;align-items:center;justify-content:center;min-height:100vh}
.login{background:rgba(5,15,40,.9);padding:30px;border-radius:20px;box-shadow:0 0 25px #00e5ff;border:1px solid #00e5ff;width:340px}
h2{text-align:center;color:#00e5ff}
input,button{width:100%;padding:12px;box-sizing:border-box}
input{margin:10px 0;background:#081321;color:#fff;border:1px solid #00e5ff}
button{background:#00e5ff;color:#001;font-weight:bold;border:0;cursor:pointer}
#error{display:none;color:#ff6666}
</style>
</head>
<body>
<div class="login">
<h2>Acceso</h2>
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<p id="error">Contraseña incorrecta.</p>
</div>
<script>
const PASSWORD='0510';
function login(){
 if(document.getElementById('password').value===PASSWORD){
   location.href='home.html';
 }else{
   document.getElementById('error').style.display='block';
 }
}
</script>
</body>
</html>
