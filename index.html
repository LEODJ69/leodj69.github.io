<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }
        .login-box h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .textbox {
            margin-bottom: 15px;
            text-align: left;
        }
        .textbox label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        .textbox input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5c67f2;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4a54e1;
        }
        .mensaje-error {
            color: red;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form onsubmit="verificarContrasena(event)">
        <div class="textbox">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>
        </div>
        <div class="textbox">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit">Ingresar</button>
        <p id="error" class="mensaje-error">Usuario o contraseña incorrectos.</p>
    </form>
</div>

<script>
    function verificarContrasena(event) {
        event.preventDefault(); // Evita que la página se recargue por defecto

        const user = document.getElementById('usuario').value;
        const pass = document.getElementById('password').value;
        
        // Cambia 'admin' y 'secreto' por tu usuario y contraseña deseados
        if (user === 'admin' && pass === 'secreto') {
            alert('¡Acceso concedido!');
            // Aquí puedes redirigir a otra página usando:  
			window.location.href = "https://luisefrainorlando.wixsite.com/deportetv";
			
        } else {
            document.getElementById('error').style.display = 'block';
        }
    }
</script>

</body>
</html>
