<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multimedia en Vivo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#050b20,#091a45,#0f4c81);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.contenedor{
    width:95%;
    max-width:1100px;
    text-align:center;
}

h1{
    color:#fff;
    font-size:45px;
    margin-bottom:15px;
    text-shadow:0 0 20px #00e1ff;
}

p{
    color:#d9e9ff;
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.boton{
    text-decoration:none;
    color:white;
    padding:35px 20px;
    border-radius:18px;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
    border:2px solid rgba(255,255,255,.15);
    backdrop-filter:blur(8px);
    background:rgba(255,255,255,.08);
    box-shadow:0 0 25px rgba(0,255,255,.15);
}

.boton:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 0 35px cyan;
}

.icono{
    font-size:60px;
    display:block;
    margin-bottom:15px;
}

.radio{
    background:linear-gradient(45deg,#ff6a00,#ffb000);
}

.tv{
    background:linear-gradient(45deg,#004cff,#00b7ff);
}

.youtube{
    background:linear-gradient(45deg,#ff0000,#ff5555);
}

.facebook{
    background:linear-gradient(45deg,#1877F2,#42A5F5);
}

.tiktok{
    background:linear-gradient(45deg,#000,#444);
}

.whatsapp{
    background:linear-gradient(45deg,#00b712,#4cff6d);
}

footer{
    margin-top:40px;
    color:white;
    opacity:.8;
}
</style>

</head>
<body>

<div class="contenedor">

<h1>?? MULTIMEDIA EN VIVO</h1>

<div class="grid">

</a>

<a class="boton tv" href="tv.html">
<span class="icono">??</span>

</a>

<a class="boton youtube" href="https://youtube.com/" target="_blank">
<span class="icono">??</span>
YOUTUBE LIVE
</a>

<a class="boton facebook" href="https://facebook.com/" target="_blank">
<span class="icono">??</span>
FACEBOOK LIVE
</a>

<a class="boton tiktok" href="https://tiktok.com/" target="_blank">
<span class="icono">??</span>

</a>

<a class="boton whatsapp" href="https://wa.me/59170000000" target="_blank">
<span class="icono">??</span>

</a>

</div>

<footer>

</footer>

</div>

</body>
</html>
