<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IPTV Player Pro</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    background:#08111f;
    color:#fff;
    font-family:Arial,sans-serif;
    overflow:hidden;
}
.wrap{
    display:flex;
    height:100vh;
    padding:10px;
    gap:10px;
}
.sidebar{
    width:340px;
    transition:width .3s ease;

    min-width:280px;
    height:calc(100vh - 20px);
    display:flex;
    flex-direction:column;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(18px);
    border-radius:16px;
    border:1px solid rgba(0,207,255,.25);
    overflow:hidden;
}
.topbar{
    padding:10px;
}
.home-btn{
    width:100%;
    background:#00cfff;
    color:#08111f;
    border:none;
    padding:12px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}
input{
    margin:8px;
    padding:12px;
    background:#112;
    color:#fff;
    border:1px solid #1ee7ff;
    border-radius:8px;
}
select{
    flex:1;
    margin:8px;
    background:#0d1728;
    color:#fff;
    border:1px solid #1ee7ff;
    border-radius:8px;
    padding:4px;
}
select option{
    padding:10px;
}

.sidebar.collapsed{
    width:220px;
    min-width:220px;
}
/* Mantener visibles Home, Búsqueda y Lista M3U8 */
.sidebar.collapsed .topbar{
    display:block;
}
.sidebar.collapsed input{
    display:block;
}

/* Mantener nombres de canales legibles incluso en vista reducida */
.sidebar.collapsed select{
    font-size:14px;
}
select{
    font-size:15px;
}
select option{
    white-space:nowrap;
}

.player-area{
    flex:1;
    height:calc(100vh - 20px);
}
video{
    width:100%;
    height:100%;
    background:#000;
    border:2px solid #1ee7ff;
    border-radius:12px;
    box-shadow:0 0 15px #00cfff55;
}
:focus{
    outline:3px solid #ffd700;
    outline-offset:2px;
}

@media (max-width:900px){
    .sidebar{
        width:38%;
        min-width:220px;
    }
}
</style>
</head>
<body>

<div class="wrap">

    <div class="sidebar" id="sidebar">
        <div class="topbar">
            <button class="home-btn" onclick="goHome()" tabindex="1">🏠 HOME</button>
        </div>

        <input id="s" type="text" placeholder="Buscar canal..." tabindex="2">
        <select id="ch" size="25" tabindex="3"></select>
    </div>

    <div class="player-area">
        <video id="v" controls autoplay></video>
    </div>

</div>

<script>
let all=[];

let currentChannelUrl="";
let reconnectAttempts=0;
const MAX_RECONNECT_ATTEMPTS=999;

function scheduleReconnect(){
    if(!currentChannelUrl) return;
    reconnectAttempts++;
    setTimeout(()=>{
        play(currentChannelUrl,true);
    }, Math.min(5000, 1000 * reconnectAttempts));
}


function showChannelList(){
    document.getElementById('sidebar').classList.remove('collapsed');
}

function hideChannelList(){
    document.getElementById('sidebar').classList.add('collapsed');
}

window.addEventListener('popstate',()=>{
    showChannelList();
});

document.addEventListener('keydown',e=>{
    if(e.key==='Backspace'){
        showChannelList();
    }
});

fetch("https://raw.githubusercontent.com/12081985EFRAIN/28122024/refs/heads/main/lista.m3u8")
.then(r=>r.text())
.then(t=>{
    let m={};
    t.split(/\r?\n/).forEach(l=>{
        if(l.startsWith("#EXTINF")) m={n:l.split(",").pop()};
        else if(/^https?:/.test(l)) all.push({n:m.n,u:l});
    });

    render(all);
});

function render(arr){
    ch.innerHTML="";
    arr.forEach(c=>{
        let o=document.createElement("option");
        o.text=c.n;
        o.value=c.u;
        ch.add(o);
    });
}

s.oninput=()=>render(
    all.filter(x=>x.n.toLowerCase().includes(s.value.toLowerCase()))
);

ch.onchange=()=>{
    play(ch.value);

    // Ocultar lista al reproducir
    hideChannelList();
};

function play(u,isReconnect=false){
    currentChannelUrl=u;

    if(Hls.isSupported()){
        window.h && h.destroy();

        h=new Hls({
            enableWorker:true,
            manifestLoadingTimeOut:15000,
            levelLoadingTimeOut:15000,
            fragLoadingTimeOut:20000
        });

        h.loadSource(u);
        h.attachMedia(v);

        h.on(Hls.Events.MANIFEST_PARSED,()=>{
            reconnectAttempts=0;
            v.play().catch(()=>{});
        });

        h.on(Hls.Events.ERROR,(event,data)=>{
            if(data.fatal){
                scheduleReconnect();
            }
        });
    }else{
        v.src=u;
        v.play().catch(()=>{});
    }
}



v.addEventListener('error',()=>{
    scheduleReconnect();
});

v.addEventListener('stalled',()=>{
    scheduleReconnect();
});

v.addEventListener('waiting',()=>{
    setTimeout(()=>{
        if(v.readyState < 3){
            scheduleReconnect();
        }
    },5000);
});

window.addEventListener('online',()=>{
    reconnectAttempts=0;
    if(currentChannelUrl){
        play(currentChannelUrl,true);
    }
});

// Evitar que un clic sobre el video pause la reproducción
v.addEventListener('pause',()=>{
    if(!v.ended){
        setTimeout(()=>{ if(v.paused && !v.ended) v.play(); },10);
    }
});

// Mostrar/ocultar lista al hacer clic sobre el reproductor
v.addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('collapsed');
});

document.addEventListener('keydown',e=>{
    const panel=document.getElementById('sidebar');

    if(e.key==='Escape' || e.key==='ArrowLeft'){
        panel.classList.remove('collapsed');
        ch.focus();
    }

    if(e.key==='ArrowDown'){
        e.preventDefault();
        ch.focus();
        ch.selectedIndex=Math.min(ch.options.length-1,ch.selectedIndex+1);
        ch.options[ch.selectedIndex]?.scrollIntoView({block:'nearest'});
    }

    if(e.key==='ArrowUp'){
        e.preventDefault();
        ch.focus();
        ch.selectedIndex=Math.max(0,ch.selectedIndex-1);
        ch.options[ch.selectedIndex]?.scrollIntoView({block:'nearest'});
    }

    if((e.key==='Enter' || e.key==='NumpadEnter') && document.activeElement===ch){
        e.preventDefault();
        ch.dispatchEvent(new Event('change'));
    }
});

ch.addEventListener('focus',()=>{
    if(ch.selectedIndex < 0 && ch.options.length){
        ch.selectedIndex = 0;
    }
});

document.getElementById('sidebar').addEventListener('click',()=>{document.getElementById('sidebar').classList.remove('collapsed');});

function goHome(){
    window.location.href="home.html";
}
</script>

</body>
</html>
